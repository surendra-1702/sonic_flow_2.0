<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonicFlow - Lost in the Music</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .error-page { text-align: center; padding: 60px 20px; }
    .error-page i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; filter: drop-shadow(0 0 30px var(--primary-glow)); }
    .error-page h1 { font-size: 5rem; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 8px; }
    .error-page h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 10px; }
    .error-page p { color: var(--text-muted); margin-bottom: 28px; font-size: 0.95rem; }
    .error-page .auth-btn { display: inline-flex; width: auto; padding: 13px 32px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-glass error-page">
      <i class="fas fa-headphones"></i>
      <h1>404</h1>
      <h2>Lost in the music</h2>
      <p>This page doesn't exist. Let's get you back on track.</p>
      <a href="/" class="auth-btn">Back to Home</a>
    </div>
  </div>
</body>
</html>
