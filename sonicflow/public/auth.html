<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonicFlow - Sign In</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-glass">
      <div class="auth-brand">
        <i class="fas fa-headphones"></i>
        <h1>SonicFlow</h1>
        <p>Feel the music</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Create Account</button>
      </div>

      <form class="auth-form active" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
        <p class="auth-error" id="loginError"></p>
      </form>

      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" required minlength="2">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="At least 6 characters" required minlength="6">
            <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
        <p class="auth-error" id="registerError"></p>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
